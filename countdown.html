<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #wrap {
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      display: flex;
      align-items: center;
    }

    #timer {
      box-sizing: border-box;
      line-height: 1.2;
      color: #111;
      word-break: break-word;
      margin: 0;
      padding: 0;
    }

    .expired {
      color: #b00020;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="timer">Loading...</div>
  </div>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function clamp(num, min, max) {
      return Math.min(Math.max(num, min), max);
    }

    function getNumberParam(name, fallback, min, max) {
      const raw = getParam(name);
      if (raw === null || raw === "") return fallback;
      const num = Number(raw);
      if (isNaN(num)) return fallback;
      return clamp(num, min, max);
    }

    function getAlignParam() {
      const raw = (getParam("align") || "center").toLowerCase();
      const allowed = ["left", "right", "center", "justify"];
      return allowed.includes(raw) ? raw : "center";
    }

    function formatCountdown(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}m ${String(seconds).padStart(2, "0")}s`;
    }

    function reportHeight() {
      const height = Math.ceil(
        Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight
        )
      );
      window.parent.postMessage({ iframeHeight: height }, "*");
    }

    const wrapEl = document.getElementById("wrap");
    const timerEl = document.getElementById("timer");

    const targetParam = getParam("target");
    const targetTime = Number(targetParam);

    const textAlign = getAlignParam();
    const fontWeight = getNumberParam("weight", 600, 100, 900);
    const fontSize = getNumberParam("size", 20, 1, 500);
    const boxWidth = getNumberParam("width", 100, 1, 100);
    const boxHeight = getNumberParam("height", 100, 1, 100);
    const label = getParam("label") || "Expires in:";

    timerEl.style.fontWeight = String(fontWeight);
    timerEl.style.fontSize = `${fontSize}px`;
    timerEl.style.width = `${boxWidth}vw`;
    timerEl.style.height = `${boxHeight}vh`;
    timerEl.style.textAlign = textAlign;

    if (textAlign === "left") {
      wrapEl.style.justifyContent = "flex-start";
    } else if (textAlign === "right") {
      wrapEl.style.justifyContent = "flex-end";
    } else {
      wrapEl.style.justifyContent = "center";
    }

    if (!targetParam) {
      timerEl.textContent = "No target date";
      timerEl.classList.add("error");
      reportHeight();
    } else if (isNaN(targetTime)) {
      timerEl.textContent = "Invalid date";
      timerEl.classList.add("error");
      reportHeight();
    } else {
      let intervalId;

      function updateTimer() {
        const now = Date.now();
        const distance = targetTime - now;

        if (distance <= 0) {
          timerEl.textContent = "EXPIRED";
          timerEl.classList.add("expired");
          if (intervalId) clearInterval(intervalId);
          reportHeight();
          return;
        }

        timerEl.textContent = `${label} ${formatCountdown(distance)}`;
        reportHeight();
      }

      updateTimer();
      intervalId = setInterval(updateTimer, 1000);
    }

    window.addEventListener("load", reportHeight);
    window.addEventListener("resize", reportHeight);

    const ro = new ResizeObserver(reportHeight);
    ro.observe(document.body);
    ro.observe(document.documentElement);
  </script>
</body>
</html>
