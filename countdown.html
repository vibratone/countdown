<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function formatCountdown(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  const timerEl = document.getElementById("timer");
  const targetParam = getParam("target");
  const targetTime = Number(targetParam);

  if (!targetParam) {
    timerEl.textContent = "No target date";
    timerEl.className = "error";
  } else if (isNaN(targetTime)) {
    timerEl.textContent = "Invalid date";
    timerEl.className = "error";
  } else {
    function updateTimer() {
      const now = Date.now();
      const distance = targetTime - now;

      if (distance <= 0) {
        timerEl.textContent = "EXPIRED";
        timerEl.className = "expired";
        clearInterval(intervalId);
        return;
      }

      timerEl.textContent = formatCountdown(distance);
    }

    updateTimer();
    const intervalId = setInterval(updateTimer, 1000);
  }
</script>
