<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
    }

    .timer {
      line-height: 1.2;
      color: #111;
      word-break: break-word;
      box-sizing: border-box;
    }

    .expired {
      color: #b00020;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <div id="wrap" class="wrap">
    <div id="timer" class="timer">Loading...</div>
  </div>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function clamp(num, min, max) {
      return Math.min(Math.max(num, min), max);
    }

    function getNumberParam(name, fallback, min, max) {
      const raw = getParam(name);
      if (raw === null || raw === "") return fallback;
      const num = Number(raw);
      if (isNaN(num)) return fallback;
      return clamp(num, min, max);
    }

    function getAlignParam() {
      const raw = (getParam("align") || "center").toLowerCase();
      const allowed = ["left", "right", "center", "justify"];
      return allowed.includes(raw) ? raw : "center";
    }

    function formatCountdown(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    const wrapEl = document.getElementById("wrap");
    const timerEl = document.getElementById("timer");

    const targetParam = getParam("target");
    const targetTime = Number(targetParam);

    const textAlign = getAlignParam();
    const fontWeight = getNumberParam("weight", 600, 100, 900);
    const fontSize = getNumberParam("size", 20, 1, 500);
    const boxWidth = getNumberParam("width", 100, 1, 100);
    const boxHeight = getNumberParam("height", 100, 1, 100);

    timerEl.style.textAlign = textAlign;
    timerEl.style.fontWeight = String(fontWeight);
    timerEl.style.fontSize = `${fontSize}px`;
    timerEl.style.width = `${boxWidth}vw`;
    timerEl.style.height = `${boxHeight}vh`;
    timerEl.style.display = "flex";
    timerEl.style.alignItems = "center";
    timerEl.style.justifyContent = "center";
    timerEl.style.margin = "0";
    timerEl.style.padding = "0";

    if (!targetParam) {
      timerEl.textContent = "No target date";
      timerEl.classList.add("error");
    } else if (isNaN(targetTime)) {
      timerEl.textContent = "Invalid date";
      timerEl.classList.add("error");
    } else {
      let intervalId;

      function updateTimer() {
        const now = Date.now();
        const distance = targetTime - now;

        if (distance <= 0) {
          timerEl.textContent = "EXPIRED";
          timerEl.classList.add("expired");
          if (intervalId) clearInterval(intervalId);
          return;
        }

        timerEl.textContent = formatCountdown(distance);
      }

      updateTimer();
      intervalId = setInterval(updateTimer, 1000);
    }
  </script>
</body>
</html>
